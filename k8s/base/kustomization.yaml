apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml

labels:
  - pairs:
      app.kubernetes.io/component: web
      app.kubernetes.io/part-of: color-demo
    includeTemplates: true
  # Default instance label keeps the base Service from cross-selecting
  # blue/green pods; each overlay overwrites the value with its own name.
  - pairs:
      app.kubernetes.io/instance: color
    includeSelectors: true
