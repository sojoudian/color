apiVersion: apps/v1
kind: Deployment
metadata:
  name: color
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: color
  template:
    metadata:
      labels:
        app.kubernetes.io/name: color
    spec:
      # The app gets its namespace via the Downward API, so no token mount.
      automountServiceAccountToken: false
      # Runs as root so the server can bind port 80 (drop-in compatible
      # with jpetazzo/color); all other hardening is kept.
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      # Spread replicas across nodes so load-balancing demos hit every node.
      # ScheduleAnyway keeps single-node (kind) clusters schedulable.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: color
          matchLabelKeys:
            - pod-template-hash
      containers:
        - name: color
          # :latest keeps the default imagePullPolicy Always, so every new
          # pod picks up the most recently published image.
          image: ghcr.io/sojoudian/color:latest
          ports:
            - name: http
              containerPort: 80
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: GOMEMLIMIT
              valueFrom:
                resourceFieldRef:
                  resource: limits.memory
          # Hold SIGTERM for a few seconds so endpoint removal propagates
          # before the listener closes — keeps rolling updates error-free.
          # Native sleep action: no shell needed (distroless), beta since
          # k8s 1.30, GA 1.32.
          lifecycle:
            preStop:
              sleep:
                seconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              # Memory limit == request for deterministic OOM behavior.
              # No CPU limit on purpose: avoid throttling a tiny demo app.
              memory: 32Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
              add:
                # Required to bind port 80.
                - NET_BIND_SERVICE
