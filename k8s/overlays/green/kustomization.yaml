apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Pods become "green-color-<rs>-<pod>", so the page background is green:
# the app uses the hostname segment before the first dash as the color.
namePrefix: green-

resources:
  - ../../base

labels:
  - pairs:
      app.kubernetes.io/instance: green
    includeSelectors: true
