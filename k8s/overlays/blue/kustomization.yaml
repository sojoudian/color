apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Pods become "blue-color-<rs>-<pod>", so the page background is blue:
# the app uses the hostname segment before the first dash as the color.
namePrefix: blue-

resources:
  - ../../base

labels:
  - pairs:
      app.kubernetes.io/instance: blue
    includeSelectors: true
